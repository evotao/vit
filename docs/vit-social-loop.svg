<svg viewBox="0 0 800 490" xmlns="http://www.w3.org/2000/svg">
  <style>
    text { font-family: system-ui, -apple-system, sans-serif; }
  </style>

  <defs>
    <marker id="arr" markerWidth="10" markerHeight="7" refX="8" refY="3.5" orient="auto">
      <path d="M1.5,1 L8,3.5 L1.5,6" fill="none" stroke="#06D6A0" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!--
    All arcs: segments of one circle, r=185, center=(400,255).
    Labels sit inside at r=130 — 55px clearance from arcs.
    13° gap on each side of each vertex.
  -->

  <!-- vertex dots — on the arc ring, anchoring each label to the flow -->
  <g fill="#06D6A0">
    <circle cx="400" cy="70" r="4.5"/>    <!-- skim -->
    <circle cx="576" cy="198" r="4.5"/>   <!-- vet -->
    <circle cx="509" cy="405" r="4.5"/>   <!-- remix -->
    <circle cx="291" cy="405" r="4.5"/>   <!-- vouch -->
    <circle cx="224" cy="198" r="4.5"/>   <!-- ship -->
  </g>

  <!-- flow arcs — clockwise: skim → vet → remix → vouch → ship → skim -->
  <g fill="none" stroke="#06D6A0" stroke-width="2.5" stroke-linecap="round">
    <path d="M442,75 A185,185 0 0 1 559,160" marker-end="url(#arr)"/>
    <path d="M584,239 A185,185 0 0 1 540,376" marker-end="url(#arr)"/>
    <path d="M472,425 A185,185 0 0 1 328,425" marker-end="url(#arr)"/>
    <path d="M260,376 A185,185 0 0 1 216,239" marker-end="url(#arr)"/>
    <path d="M241,160 A185,185 0 0 1 358,75" marker-end="url(#arr)"/>
  </g>

  <!-- skim — top -->
  <text x="400" y="123" text-anchor="middle" font-size="26" font-weight="700" fill="#059669" letter-spacing="1">skim</text>
  <text x="400" y="143" text-anchor="middle" font-size="13" fill="#6b7280">browse what others share</text>

  <!-- vet — upper right -->
  <text x="524" y="213" text-anchor="middle" font-size="26" font-weight="700" fill="#059669" letter-spacing="1">vet</text>
  <text x="524" y="233" text-anchor="middle" font-size="13" fill="#6b7280">check it</text>

  <!-- remix — lower right -->
  <text x="476" y="358" text-anchor="middle" font-size="26" font-weight="700" fill="#059669" letter-spacing="1">remix</text>
  <text x="476" y="378" text-anchor="middle" font-size="13" fill="#6b7280">make it yours</text>

  <!-- vouch — lower left -->
  <text x="324" y="358" text-anchor="middle" font-size="26" font-weight="700" fill="#059669" letter-spacing="1">vouch</text>
  <text x="324" y="378" text-anchor="middle" font-size="13" fill="#6b7280">endorse what works</text>

  <!-- ship — upper left -->
  <text x="276" y="213" text-anchor="middle" font-size="26" font-weight="700" fill="#059669" letter-spacing="1">ship</text>
  <text x="276" y="233" text-anchor="middle" font-size="13" fill="#6b7280">share it back</text>

  <!-- center tagline -->
  <text x="400" y="268" text-anchor="middle" font-size="18" font-weight="600" fill="#059669" letter-spacing="0.5">open source is social</text>

  <!-- vit mark — subtle, bottom right -->
  <g transform="translate(755, 458) scale(0.55)" opacity="0.25">
    <circle cx="16" cy="5.5" r="3" fill="#06D6A0"/>
    <path d="M5.5 10 L16 26 L26.5 10" stroke="#06D6A0" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  </g>
</svg>
