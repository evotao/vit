  <g opacity="0.4">
    <line x1="55" y1="168" x2="172" y2="134" stroke="#252836" stroke-width="0.7" stroke-dasharray="3,4"/>
    <circle cx="47" cy="170" r="7" fill="none" stroke="#252836" stroke-width="1" stroke-dasharray="3,3"/>

    <line x1="340" y1="173" x2="218" y2="134" stroke="#252836" stroke-width="0.7" stroke-dasharray="3,4"/>
    <circle cx="348" cy="175" r="7" fill="none" stroke="#252836" stroke-width="1" stroke-dasharray="3,3"/>

    <line x1="280" y1="340" x2="201" y2="150" stroke="#252836" stroke-width="0.7" stroke-dasharray="3,4"/>
    <circle cx="285" cy="345" r="7" fill="none" stroke="#252836" stroke-width="1" stroke-dasharray="3,3"/>
  </g>

  <!-- Labels -->
  <text x="125" y="168" text-anchor="middle" font-size="8.5" fill="#4b5563" font-style="italic">PR</text>
  <text x="268" y="168" text-anchor="middle" font-size="8.5" fill="#4b5563" font-style="italic">PR</text>
  <text x="215" y="232" text-anchor="middle" font-size="8.5" fill="#4b5563" font-style="italic">issue</text>
  <text x="90" y="240" text-anchor="middle" font-size="8.5" fill="#4b5563" font-style="italic">PR</text>

  <!-- Left caption -->
  <text x="195" y="392" text-anchor="middle" font-size="10.5" fill="#4b5563">clone · file issues · fork · merge PRs · wait for releases</text>

  <!-- ==================== EVOLUTION ARROW ==================== -->
  <g transform="translate(400, 220)">
    <circle r="16" fill="#141722" stroke="#252836" stroke-width="1"/>
    <path d="M-5.5 0 L4.5 0 M1.5 -3.5 L5.5 0 L1.5 3.5" stroke="#4b5563" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  </g>

  <!-- ==================== RIGHT SIDE: NEW WORLD ==================== -->

  <text x="600" y="50" text-anchor="middle" font-size="18" font-weight="600" fill="#059669" letter-spacing="0.05em">with vit</text>

  <!-- Mesh connections (slightly increased opacity for density) -->
  <g stroke="#06D6A0" stroke-width="0.8" opacity="0.25">
    <line x1="505" y1="120" x2="618" y2="95"/>
    <line x1="618" y1="95" x2="710" y2="130"/>
    <line x1="505" y1="120" x2="465" y2="210"/>
    <line x1="505" y1="120" x2="575" y2="200"/>
    <line x1="618" y1="95" x2="575" y2="200"/>
    <line x1="618" y1="95" x2="685" y2="195"/>
    <line x1="710" y1="130" x2="685" y2="195"/>
    <line x1="710" y1="130" x2="740" y2="260"/>
    <line x1="465" y1="210" x2="575" y2="200"/>
    <line x1="575" y1="200" x2="685" y2="195"/>
    <line x1="685" y1="195" x2="740" y2="260"/>
    <line x1="465" y1="210" x2="500" y2="305"/>
    <line x1="575" y1="200" x2="500" y2="305"/>
    <line x1="575" y1="200" x2="620" y2="315"/>
    <line x1="685" y1="195" x2="620" y2="315"/>
    <line x1="685" y1="195" x2="715" y2="300"/>
    <line x1="740" y1="260" x2="715" y2="300"/>
    <line x1="500" y1="305" x2="620" y2="315"/>
    <line x1="620" y1="315" x2="715" y2="300"/>
    <line x1="505" y1="120" x2="685" y2="195"/>
    <line x1="710" y1="130" x2="620" y2="315"/>
    <line x1="465" y1="210" x2="620" y2="315"/>
    <line x1="740" y1="260" x2="620" y2="315"/>
  </g>

  <!-- Capability dots -->
  <g>
    <circle cx="558" cy="109" r="2.5" fill="#06D6A0" opacity="0.8" filter="url(#dotGlow)"/>
    <circle cx="668" cy="110" r="2" fill="#34D399" opacity="0.7" filter="url(#dotGlow)"/>
    <circle cx="488" cy="162" r="2.5" fill="#06D6A0" opacity="0.7" filter="url(#dotGlow)"/>
    <circle cx="545" cy="155" r="2" fill="#34D399" opacity="0.75" filter="url(#dotGlow)"/>
    <circle cx="648" cy="148" r="2.5" fill="#06D6A0" opacity="0.65" filter="url(#dotGlow)"/>
    <circle cx="700" cy="162" r="2" fill="#34D399" opacity="0.7" filter="url(#dotGlow)"/>
    <circle cx="525" cy="205" r="2.5" fill="#06D6A0" opacity="0.75" filter="url(#dotGlow)"/>
    <circle cx="632" cy="197" r="2" fill="#34D399" opacity="0.8" filter="url(#dotGlow)"/>
    <circle cx="718" cy="228" r="2.5" fill="#06D6A0" opacity="0.7" filter="url(#dotGlow)"/>
    <circle cx="485" cy="258" r="2" fill="#34D399" opacity="0.65" filter="url(#dotGlow)"/>
    <circle cx="543" cy="252" r="2.5" fill="#06D6A0" opacity="0.75" filter="url(#dotGlow)"/>
    <circle cx="655" cy="258" r="2" fill="#34D399" opacity="0.7" filter="url(#dotGlow)"/>
    <circle cx="728" cy="280" r="2.5" fill="#06D6A0" opacity="0.8" filter="url(#dotGlow)"/>
    <circle cx="560" cy="310" r="2" fill="#34D399" opacity="0.7" filter="url(#dotGlow)"/>
    <circle cx="670" cy="307" r="2.5" fill="#06D6A0" opacity="0.75" filter="url(#dotGlow)"/>
    <circle cx="600" cy="148" r="2" fill="#06D6A0" opacity="0.5" filter="url(#dotGlow)"/>
  </g>

  <!-- Mesh nodes -->
  <g>
    <circle cx="505" cy="120" r="13" fill="#0a2a1f" stroke="#06D6A0" stroke-width="1.5" filter="url(#glow)"/>
    <circle cx="618" cy="95"  r="13" fill="#0a2a1f" stroke="#06D6A0" stroke-width="1.5" filter="url(#glow)"/>
    <circle cx="710" cy="130" r="13" fill="#0a2a1f" stroke="#06D6A0" stroke-width="1.5" filter="url(#glow)"/>
    <circle cx="465" cy="210" r="13" fill="#0a2a1f" stroke="#06D6A0" stroke-width="1.5" filter="url(#glow)"/>
    <circle cx="575" cy="200" r="13" fill="#0a2a1f" stroke="#06D6A0" stroke-width="1.5" filter="url(#glow)"/>
    <circle cx="685" cy="195" r="13" fill="#0a2a1f" stroke="#06D6A0" stroke-width="1.5" filter="url(#glow)"/>
    <circle cx="740" cy="260" r="13" fill="#0a2a1f" stroke="#06D6A0" stroke-width="1.5" filter="url(#glow)"/>
