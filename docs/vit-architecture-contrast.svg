<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 440" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="dotGlow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="pressure" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="440" fill="#0f1119" rx="12"/>

  <!-- Subtle center divider -->
  <line x1="400" y1="55" x2="400" y2="395" stroke="#1a1d2a" stroke-width="1"/>

  <!-- ==================== LEFT SIDE: OLD WORLD ==================== -->

  <text x="195" y="50" text-anchor="middle" font-size="18" font-weight="600" fill="#6b7280" letter-spacing="0.05em">today</text>

  <!-- Pressure halo behind upstream -->
  <circle cx="195" cy="122" r="40" fill="none" stroke="#374151" stroke-width="1" opacity="0.2" filter="url(#pressure)"/>

  <!-- Central upstream node -->
  <circle cx="195" cy="122" r="28" fill="#1a1d2a" stroke="#6b7280" stroke-width="3"/>
  <text x="195" y="119" text-anchor="middle" font-size="9.5" font-weight="700" fill="#9ca3af" letter-spacing="0.04em">upstream</text>
  <text x="195" y="131" text-anchor="middle" font-size="7.5" fill="#4b5563">maintainer</text>

  <!-- "wait" badge -->
  <g transform="translate(228, 99)">
    <rect x="0" y="0" width="30" height="15" rx="3" fill="#1a1d2a" stroke="#374151" stroke-width="0.8"/>
    <text x="15" y="11" text-anchor="middle" font-size="7.5" fill="#4b5563" font-style="italic">wait</text>
  </g>

  <!-- Fork positions:
    A: 85, 200   → upstream ~173, 140
    B: 110, 255  → upstream ~178, 143
    C: 155, 290  → upstream ~189, 150
    D: 195, 305  → upstream  195, 150
    E: 235, 290  → upstream ~201, 150
    F: 280, 255  → upstream ~212, 143
    G: 305, 200  → upstream ~217, 140
  -->

  <!-- Lines from forks to upstream -->
  <g stroke="#374151" fill="none" stroke-width="1.2">
    <line x1="85"  y1="200" x2="173" y2="140"/>
    <line x1="110" y1="255" x2="178" y2="143"/>
    <line x1="155" y1="290" x2="189" y2="150"/>
    <line x1="195" y1="305" x2="195" y2="150"/>
    <line x1="235" y1="290" x2="201" y2="150"/>
    <line x1="280" y1="255" x2="212" y2="143"/>
    <line x1="305" y1="200" x2="217" y2="140"/>
  </g>

  <!-- Chevrons pointing toward upstream
       Each chevron: two lines forming a V that opens away from upstream.
       Placed at ~35% from fork toward upstream.
       Computed: for a line from (fx,fy) to (ux,uy),
       point = (fx + 0.35*(ux-fx), fy + 0.35*(uy-fy))
       direction = normalize(ux-fx, uy-fy)
       perpendicular = (-dy, dx)
       chevron tip = point, wings = point - 5*dir +/- 4*perp
  -->
  <g stroke="#505868" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <!-- A: fork(85,200)→up(173,140). vec=(88,-60), len=106.5, dir=(0.826,-0.564), perp=(0.564,0.826)
         35% point: (85+30.8, 200-21) = (115.8, 179)
         tip = (115.8, 179)
         wing1 = (115.8 - 5*0.826 + 4*0.564, 179 - 5*(-0.564) + 4*0.826) = (115.8-4.13+2.26, 179+2.82+3.30) = (113.9, 185.1)
         wing2 = (115.8 - 5*0.826 - 4*0.564, 179 - 5*(-0.564) - 4*0.826) = (115.8-4.13-2.26, 179+2.82-3.30) = (109.4, 178.5)
    -->
    <path d="M114,185 L116,179 L109,179"/>

    <!-- B: fork(110,255)→up(178,143). vec=(68,-112), len=131, dir=(0.519,-0.855), perp=(0.855,0.519)
         35% point: (110+23.8, 255-39.2) = (133.8, 215.8)
         tip = (134, 216)
         wing1 = (134 - 5*0.519 + 4*0.855, 216 - 5*(-0.855) + 4*0.519) = (134-2.6+3.4, 216+4.3+2.1) = (134.8, 222.4)
         wing2 = (134 - 5*0.519 - 4*0.855, 216 - 5*(-0.855) - 4*0.519) = (134-2.6-3.4, 216+4.3-2.1) = (128, 218.2)
    -->
    <path d="M135,222 L134,216 L128,218"/>

    <!-- C: fork(155,290)→up(189,150). vec=(34,-140), len=144, dir=(0.236,-0.972), perp=(0.972,0.236)
         35% point: (155+11.9, 290-49) = (166.9, 241)
         tip = (167, 241)
         wing1 = (167 - 5*0.236 + 4*0.972, 241 - 5*(-0.972) + 4*0.236) = (167-1.2+3.9, 241+4.9+0.9) = (169.7, 246.8)
         wing2 = (167 - 5*0.236 - 4*0.972, 241 - 5*(-0.972) - 4*0.236) = (167-1.2-3.9, 241+4.9-0.9) = (161.9, 245)
    -->
    <path d="M170,247 L167,241 L162,245"/>

    <!-- D: fork(195,305)→up(195,150). vec=(0,-155), dir=(0,-1), perp=(1,0)
         35% point: (195, 305-54.25) = (195, 250.75)
         tip = (195, 251)
         wing1 = (195 - 0 + 4, 251 + 5 + 0) = (199, 256)
         wing2 = (195 - 0 - 4, 251 + 5 - 0) = (191, 256)
    -->
    <path d="M199,256 L195,251 L191,256"/>

    <!-- E: fork(235,290)→up(201,150). vec=(-34,-140), dir=(-0.236,-0.972), perp=(0.972,-0.236)
         35% point: (235-11.9, 290-49) = (223.1, 241)
         tip = (223, 241)
         wing1 = (223 + 5*0.236 + 4*0.972, 241 + 5*0.972 - 4*0.236) = (223+1.2+3.9, 241+4.9-0.9) = (228.1, 245)
         wing2 = (223 + 5*0.236 - 4*0.972, 241 + 5*0.972 + 4*0.236) = (223+1.2-3.9, 241+4.9+0.9) = (220.3, 246.8)
    -->
    <path d="M228,245 L223,241 L220,247"/>

    <!-- F: fork(280,255)→up(212,143). vec=(-68,-112), dir=(-0.519,-0.855), perp=(0.855,-0.519)
         35% point: (280-23.8, 255-39.2) = (256.2, 215.8)
         tip = (256, 216)
         wing1 = (256 + 5*0.519 + 4*0.855, 216 + 5*0.855 - 4*0.519) = (256+2.6+3.4, 216+4.3-2.1) = (262, 218.2)
         wing2 = (256 + 5*0.519 - 4*0.855, 216 + 5*0.855 + 4*0.519) = (256+2.6-3.4, 216+4.3+2.1) = (255.2, 222.4)
    -->
    <path d="M262,218 L256,216 L255,222"/>

    <!-- G: fork(305,200)→up(217,140). vec=(-88,-60), dir=(-0.826,-0.564), perp=(0.564,-0.826)
         35% point: (305-30.8, 200-21) = (274.2, 179)
         tip = (274, 179)
         wing1 = (274 + 5*0.826 + 4*0.564, 179 + 5*0.564 - 4*0.826) = (274+4.1+2.3, 179+2.8-3.3) = (280.4, 178.5)
         wing2 = (274 + 5*0.826 - 4*0.564, 179 + 5*0.564 + 4*0.826) = (274+4.1-2.3, 179+2.8+3.3) = (275.8, 185.1)
    -->
    <path d="M280,179 L274,179 L276,185"/>
  </g>

  <!-- Fork nodes -->
  <g>
    <circle cx="85"  cy="208" r="12" fill="#1a1d2a" stroke="#4b5563" stroke-width="1.3"/>
    <text x="85" y="211" text-anchor="middle" font-size="7.5" fill="#6b7280">fork</text>

    <circle cx="110" cy="263" r="12" fill="#1a1d2a" stroke="#4b5563" stroke-width="1.3"/>
    <text x="110" y="266" text-anchor="middle" font-size="7.5" fill="#6b7280">fork</text>

    <circle cx="155" cy="298" r="12" fill="#1a1d2a" stroke="#4b5563" stroke-width="1.3"/>
    <text x="155" y="301" text-anchor="middle" font-size="7.5" fill="#6b7280">fork</text>

    <circle cx="195" cy="313" r="12" fill="#1a1d2a" stroke="#4b5563" stroke-width="1.3"/>
    <text x="195" y="316" text-anchor="middle" font-size="7.5" fill="#6b7280">fork</text>

    <circle cx="235" cy="298" r="12" fill="#1a1d2a" stroke="#4b5563" stroke-width="1.3"/>
